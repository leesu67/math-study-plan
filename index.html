let scheduleData = [];

function showError(msg) { const errDiv = document.getElementById('errorMsg'); errDiv.textContent = msg; errDiv.classList.add('show'); }
function hideError() { document.getElementById('errorMsg').classList.remove('show'); }
function generateSchedule() {
hideError();
const startDateStr = document.getElementById('startDate').value;
const endDateStr = document.getElementById('endDate').value;
if (!startDateStr || !endDateStr) { showError('⚠️ 請選擇開始和結束日期'); return; }
const startDate = new Date(startDateStr);
const endDate = new Date(endDateStr);
if (startDate > endDate) { showError('⚠️ 結束日期必須在開始日期之後'); return; }
const dailyChapters = parseInt(document.getElementById('dailyChapters').value);
const restDayCheckboxes = document.querySelectorAll('input[name="restDay"]:checked');
const restDays = Array.from(restDayCheckboxes).map(cb => parseInt(cb.value));
const reviewMode = document.getElementById('reviewMode').value;
const dailyPractice = parseInt(document.getElementById('dailyPractice').value);
scheduleData = [];
scheduleDataWithFullDate = [];
let currentDate = new Date(startDate);
let topicIndex = 0;
let weekCount = 0;
while (currentDate <= endDate) {
const dayOfWeek = currentDate.getDay();
const dateStr = formatDate(currentDate);
const monthKey = `${currentDate.getMonth() + 1}月`;
let dayType = 'study';
let content = '';
if (restDays.includes(dayOfWeek)) { dayType = 'rest'; content = '休息'; }
else {
const shouldReview = (reviewMode === 'weekly' && weekCount > 0 && dayOfWeek === 1) || (reviewMode === 'biweekly' && weekCount > 0 && weekCount % 2 === 0 && dayOfWeek === 1);
if (shouldReview && topicIndex > 0) { dayType = 'review'; content = '複習週'; }
else if (topicIndex < allTopics.length) {
const topicsToStudy = [];
for (let i = 0; i < dailyChapters && topicIndex < allTopics.length; i++) { topicsToStudy.push(allTopics[topicIndex]); topicIndex++; }
content = topicsToStudy.map(t => `${t.name} ${t.t}`).join(', ');
if (dayOfWeek === 0) weekCount++;
} else { dayType = 'complete'; content = '全部完成!'; }
}
const dayData = { date: dateStr, fullDate: new Date(currentDate), monthKey: monthKey, dayOfWeek: dayOfWeek, type: dayType, content: content, practice: dayType === 'study' ? dailyPractice : 0 };
scheduleData.push(dayData);
scheduleDataWithFullDate.push(dayData);
currentDate.setDate(currentDate.getDate() + 1);
}
renderCalendar();
updateSummary();
document.getElementById('scheduleContainer').classList.add('active');
document.getElementById('scheduleContainer').scrollIntoView({behavior: 'smooth'});
}
function formatDate(date) { const month = date.getMonth() + 1; const day = date.getDate(); return `${month}/${day}`; }
function renderCalendar() {
const container = document.getElementById('calendarContent');
let html = '';
const months = {};
scheduleData.forEach(day => { if (!months[day.monthKey]) months[day.monthKey] = []; months[day.monthKey].push(day); });
for (const monthKey in months) {
const monthDays = months[monthKey];
const studyCount = monthDays.filter(d => d.type === 'study').length;
html += `<div class="month-container">`;
html += `<div class="month-header"><h3>📅 ${monthKey}</h3><span class="month-stats">學習: ${studyCount}天</span></div>`;
html += `<div class="calendar-grid">`;
html += '<div class="calendar-header">日</div><div class="calendar-header">一</div><div class="calendar-header">二</div><div class="calendar-header">三</div><div class="calendar-header">四</div><div class="calendar-header">五</div><div class="calendar-header">六</div>';
const firstDay = monthDays[0].dayOfWeek;
for (let i = 0; i < firstDay; i++) { html += '<div class="calendar-day other-month"></div>'; }
monthDays.forEach(d => {
const isWeekend = (d.dayOfWeek === 0 || d.dayOfWeek === 6) && d.type !== 'rest';
const typeLabel = d.type === 'study' ? '📖學習' : d.type === 'review' ? '🔄複習' : d.type === 'rest' ? '😴休息' : '✅完成';
html += `<div class="calendar-day ${d.type} ${isWeekend ? 'weekend' : ''}">
<div class="day-number">${d.date}</div>
<div class="day-content"><div class="chapter">${d.content}</div></div>
<div class="day-type ${d.type}">${typeLabel}</div>
</div>`;
});
html += '</div></div>';
}
container.innerHTML = html;
}
function updateSummary() {
const totalDays = scheduleData.length;
const studyDays = scheduleData.filter(d => d.type === 'study').length;
const restDays = scheduleData.filter(d => d.type === 'rest').length;
const totalPractice = scheduleData.reduce((sum, d) => sum + d.practice, 0);
const progress = Math.round((studyDays * parseInt(document.getElementById('dailyChapters').value) / allTopics.length) * 100);
document.getElementById('totalDays').textContent = totalDays;
document.getElementById('studyDays').textContent = studyDays;
document.getElementById('restDaysCount').textContent = restDays;
document.getElementById('totalTopics').textContent = allTopics.length;
document.getElementById('totalPractice').textContent = totalPractice;
document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
document.getElementById('progressFill').textContent = Math.min(progress, 100) + '%';
}

['📚 高中數學數A 讀書計畫'],
['👨‍🏫 李向宇老師製作'],
['統計總覽'],
[''],
['總天數', scheduleData.length],
['學習天數', scheduleData.filter(d => d.type === 'study').length],
['複習天數', scheduleData.filter(d => d.type === 'review').length],

];

const calendarData = [];
calendarData.push([`📅 ${year}年 ${monthKey} 讀書計畫`, '', '', '', '', '', '']);
calendarData.push(['日', '一', '二', '三', '四', '五', '六']);
let weekRow = [];
for (let i = 0; i < firstDayOfWeek; i++) { weekRow.push({content: '', type: 'empty'}); }
monthDays.forEach(d => {
weekRow.push({content: d.date + '\n' + d.content, type: d.type});
if (weekRow.length === 7) { const row = weekRow.map(w => w.content); calendarData.push(row); weekRow = []; }
});
if (weekRow.length > 0) { while (weekRow.length < 7) { weekRow.push({content: '', type: 'empty'}); } const row = weekRow.map(w => w.content); calendarData.push(row); }
const ws = XLSX.utils.aoa_to_sheet(calendarData);
ws['!cols'] = [{wch: 18}, {wch: 18}, {wch: 18}, {wch: 18}, {wch: 18}, {wch: 18}, {wch: 18}];
XLSX.utils.book_append_sheet(wb, ws, monthKey);
}
XLSX.writeFile(wb, '高中數學數A讀書計畫_日曆版.xlsx');
}

function copyToClipboard() {
